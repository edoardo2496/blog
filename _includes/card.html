<article class="card">
    {% assign cat = post.category | downcase %}
    <a href="{{ post.url | relative_url }}" style="text-decoration:none; color: inherit;">
        <div class="card-image" style="background-image: url('{{ post.image | relative_url }}');"></div>
        <span class="eyebrow {{ cat }}">
            {% case cat %}
                {% when "allenamento" %}Allenamento
                {% when "filosofia" %}Filosofia
                {% when "matematica" %}Matematica
                {% else %}Note
            {% endcase %}
        </span>
        <h3 class="post-title">{{ post.title }}</h3>
        <p class="post-date">{{ post.date | date: "%d %B %Y" }}</p>
        <p class="post-excerpt">{{ post.content | strip_html | truncatewords: 20 }}</p>
    </a>
</article>
