<section class="hero-full" id="heroFull">
    <div class="hero-slides">
        {% for post in site.posts limit: 4 %}
            {% assign cat = post.category | downcase %}
            <div class="hero-slide {% if forloop.first %}active{% endif %}">
                <div class="hero-slide-bg" style="background-image: url('{{ post.image | relative_url }}');"></div>
                <div class="hero-slide-scrim"></div>
                <div class="hero-slide-content">
                    <span class="eyebrow {{ cat }}" style="color:#fff;">
                        {% case cat %}
                            {% when "allenamento" %}Allenamento
                            {% when "filosofia" %}Filosofia
                            {% when "matematica" %}Matematica
                            {% else %}Note
                        {% endcase %}
                    </span>
                    <h2 class="hero-slide-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
                </div>
            </div>
        {% endfor %}
    </div>
    <button class="hero-nav prev" onclick="moveSlide(-1)" aria-label="Precedente">&#8249;</button>
    <button class="hero-nav next" onclick="moveSlide(1)" aria-label="Successivo">&#8250;</button>
</section>

<script>
    let currentSlide = 0;
    function moveSlide(dir) {
        const slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + dir + slides.length) % slides.length;
        slides[currentSlide].classList.add('active');
    }
    setInterval(() => moveSlide(1), 6000);
</script>
