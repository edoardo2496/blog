<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymatheia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="wrapper">
        <header class="masthead">
            <p class="kicker-greek">Πολυμάθεια</p>
            <h1 class="site-title">Polymatheia</h1>
            <p class="tagline">Allenamento, filosofia, matematica — indagini su un unico metodo.</p>
            <div class="domain-marks">
                <span class="allenamento">Allenamento</span>
                <span class="filosofia">Filosofia</span>
                <span class="matematica">Matematica</span>
            </div>
        </header>
    </div>

    {% include hero.html %}

    <div class="wide-wrapper">
        <p class="section-label">Tutti gli articoli</p>
        <div class="card-grid">
            {% for post in site.posts offset: 4 %}
                {% include card.html %}
            {% endfor %}
        </div>
    </div>
</body>
</html>
